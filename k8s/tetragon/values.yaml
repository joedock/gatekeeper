# Tetragon Helm values for the gatekeeper project.

tetragon:
  enabled: true
  exportFileMaxSizeMB: 100
  exportFileRotationInterval: 5m
  exportFileMaxBackups: 5
  enableProcessCred: true
  enableProcessNs: true

  # Reliably enrich events with pod metadata, even for short-lived processes.
  # Without these, fast exec-then-exit binaries land with namespace="host".
  enablePodInfo: true
  enableCgIDmap: true

  exportAllowList: |-
    {"event_set":["PROCESS_EXEC","PROCESS_EXIT","PROCESS_KPROBE","PROCESS_UPROBE","PROCESS_TRACEPOINT","PROCESS_LSM"]}
  exportDenyList: |-
    {"health_check":true}

export:
  stdout:
    enabled: true

tolerations:
  - operator: Exists
